<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cronômetro Igreja</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }
    #timer {
      font-size: 120px;
      font-weight: bold;
    }
    button {
      font-size: 20px;
      margin: 10px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

  <h1>Cronômetro Igreja</h1>

  <div id="timer">05:00</div>

  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>
  <button onclick="reset()">Reset</button>

  <script>
    const socket = io();

    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    socket.on("timer:update", (data) => {
      let time = data.mode === "countdown"
        ? data.remaining
        : data.overtime;

      document.getElementById("timer").innerText = formatTime(time);
    });

    function start() {
      socket.emit("timer:start");
    }

    function pause() {
      socket.emit("timer:pause");
    }

    function reset() {
      socket.emit("timer:reset");
    }
  </script>

</body>
</html>
